<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="topglow" cx="50%" cy="0%" r="55%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rightglow" cx="100%" cy="50%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#topglow)"/>
  <rect width="1200" height="630" fill="url(#rightglow)"/>

  <!-- Inner frame -->
  <rect x="28" y="28" width="1144" height="574" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" rx="12"/>

  <!-- Divider -->
  <line x1="810" y1="60" x2="810" y2="570" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Left: header beacon + label -->
  <circle cx="72" cy="88" r="4" fill="#f97316"/>
  <text x="88" y="93" fill="#71717a" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" letter-spacing="2.5">BEHAVIORAL FINANCE REPORT · CASHFLINCH</text>

  <!-- Left: Headline -->
  <text x="72" y="210" fill="#ffffff" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="82" font-weight="900" letter-spacing="-2">Are your finances</text>
  <text x="72" y="307" fill="#ffffff" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="82" font-weight="900" letter-spacing="-2">secretly</text>
  <text x="72" y="404" fill="#f97316" font-family="Arial Black, Helvetica Neue, sans-serif" font-size="82" font-weight="900" letter-spacing="-2">destroying you?</text>

  <!-- Left: Brand -->
  <text x="72" y="524" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5"><tspan fill="#34d399">Cash</tspan><tspan fill="#ffffff">Flinch</tspan></text>

  <!-- Right: Burn Score label -->
  <text x="1000" y="170" fill="#52525b" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" letter-spacing="2.5" text-anchor="middle">BURN SCORE</text>

  <!-- Right: Score number -->
  <text x="1000" y="420" fill="#f97316" font-family="Georgia, 'Times New Roman', serif" font-size="228" font-style="italic" font-weight="400" text-anchor="middle" letter-spacing="-6">74</text>

  <!-- Right: /100 -->
  <text x="1000" y="460" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif" font-size="14" letter-spacing="1.5" text-anchor="middle">/ 100</text>

  <!-- Bottom: URL -->
  <text x="1150" y="588" fill="#3f3f46" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="1" text-anchor="end">cashflinch.com</text>
</svg>
